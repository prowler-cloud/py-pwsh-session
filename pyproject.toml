[build-system]
build-backend = "poetry.core.masonry.api"
requires = ["poetry-core>=2.0"]

# https://peps.python.org/pep-0621/
[project]
authors = [
  {name = "Prowler Team", email = "engineering@prowler.com"}
]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: Apache Software License"
]
dependencies = [
  ""
]
description = "Python package to manage persistent PowerShell sessions, with support for command execution, JSON result parsing, and secure error handling."
license = "Apache-2.0"
maintainers = [
  {name = "Prowler Team", email = "engineering@prowler.com"}
]
name = "py-powershell"
readme = "README.md"
requires-python = ">3.9.1,<3.14"
version = "0.1.0"

[project.urls]
"Changelog" = "https://github.com/prowler-cloud/py-powershell/releases"
"Documentation" = "https://docs.prowler.cloud"
"Homepage" = "https://github.com/prowler-cloud/py-powershell"
"Issue tracker" = "https://github.com/prowler-cloud/py-powershell/issues"